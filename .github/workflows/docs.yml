name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy pushes to the gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build & deploy docs
        run: |
          uv sync --extra docs
          uv run mkdocs gh-deploy --force
