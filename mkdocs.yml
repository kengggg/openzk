site_name: openzk
site_description: A clean, read-only Python client for ZKTeco standalone devices.
site_url: https://kengggg.github.io/openzk/
repo_url: https://github.com/kengggg/openzk
repo_name: kengggg/openzk
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Guide:
      - Getting started: guide/getting-started.md
      - Recipes: guide/recipes.md
  - Reference:
      - API: reference/api.md
      - Protocol & opcodes: reference/protocol.md
  - Architecture: ARCHITECTURE.md
  - Contributing: contributing.md
  - Disclaimer: disclaimer.md
